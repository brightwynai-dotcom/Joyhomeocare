<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <g fill="none" stroke="#24543D" stroke-linecap="round" stroke-linejoin="round" opacity="0.12" stroke-width="1.5">

    <!-- === TOP-LEFT: Homeo Globule Vial === -->
    <g transform="translate(100, 100) rotate(-15)">
      <!-- Vial body -->
      <path d="M-15,30 L-15,-10 A15,15 0 0,1 15,-10 L15,30 A5,5 0 0,1 10,35 L-10,35 A5,5 0 0,1 -15,30 Z" />
      <!-- Cap -->
      <rect x="-18" y="-22" width="36" height="12" rx="3" />
      <rect x="-16" y="-28" width="32" height="6" rx="2" />
      <!-- Globules inside -->
      <circle cx="-5" cy="20" r="3" />
      <circle cx="5" cy="25" r="3" />
      <circle cx="0" cy="12" r="3" />
      <circle cx="-8" cy="8" r="3" />
      <circle cx="8" cy="15" r="3" />
      <!-- Label -->
      <line x1="-15" y1="0" x2="15" y2="0" />
      <line x1="-15" y1="28" x2="15" y2="28" />
    </g>

    <!-- === TOP-RIGHT: Mortar & Pestle === -->
    <g transform="translate(600, 120)">
      <!-- Mortar bowl -->
      <path d="M-40,10 Q0,80 40,10" />
      <ellipse cx="0" cy="10" rx="40" ry="10" />
      <path d="M-30,40 L-20,60 L20,60 L30,40" stroke-width="1" />
      <!-- Pestle -->
      <line x1="-10" y1="-30" x2="10" y2="15" stroke-width="4" />
      <ellipse cx="-12" cy="-32" rx="6" ry="4" transform="rotate(-20,-12,-32)" />
    </g>

    <!-- === CENTER-LEFT: Dropper Bottle === -->
    <g transform="translate(150, 400) rotate(10)">
      <!-- Bottle -->
      <path d="M-20,40 L-20,-10 Q-20,-20 -10,-25 L-10,-35 L10,-35 L10,-25 Q20,-20 20,-10 L20,40 A5,5 0 0,1 15,45 L-15,45 A5,5 0 0,1 -20,40 Z" />
      <!-- Dropper cap -->
      <path d="M-12,-35 L-12,-45 Q0,-55 12,-45 L12,-35 Z" />
      <circle cx="0" cy="-55" r="6" />
      <!-- Label -->
      <rect x="-20" y="0" width="40" height="25" />
      <line x1="-10" y1="10" x2="10" y2="10" />
      <line x1="-10" y1="15" x2="10" y2="15" />
    </g>

    <!-- === CENTER: Stethoscope === -->
    <g transform="translate(400, 350)">
      <path d="M-30,-40 Q-30,-10 0,20 Q30,-10 30,-40" />
      <path d="M-30,-40 L-35,-45 L-25,-55" />
      <path d="M30,-40 L35,-45 L25,-55" />
      <line x1="0" y1="20" x2="0" y2="60" />
      <circle cx="0" cy="70" r="10" />
      <circle cx="0" cy="70" r="5" />
    </g>

    <!-- === CENTER-RIGHT: Small Herb Leaf === -->
    <g transform="translate(650, 450) rotate(-30)">
      <path d="M0,40 Q10,20 0,0 Q-10,20 0,40" />
      <path d="M0,0 Q15,-10 30,-5 Q20,10 0,0" />
      <path d="M0,0 Q-15,-10 -30,-5 Q-20,10 0,0" />
      <line x1="0" y1="40" x2="0" y2="60" />
    </g>

    <!-- === BOTTOM-LEFT: Liquid Drop & Splash === -->
    <g transform="translate(250, 650)">
      <path d="M0,-20 Q15,0 0,15 Q-15,0 0,-20 Z" />
      <path d="M-20,10 Q-10,5 -5,15" />
      <path d="M20,10 Q10,5 5,15" />
      <ellipse cx="0" cy="25" rx="30" ry="5" />
    </g>

    <!-- === BOTTOM-RIGHT: Group of small remedy vials === -->
    <g transform="translate(550, 650)">
      <!-- Vial 1 -->
      <g transform="translate(-20, 10) rotate(-10)">
        <rect x="-10" y="-15" width="20" height="30" rx="2" />
        <rect x="-12" y="-20" width="24" height="5" rx="1" />
        <line x1="-10" y1="0" x2="10" y2="0" />
      </g>
      <!-- Vial 2 -->
      <g transform="translate(20, -5) rotate(15)">
        <rect x="-10" y="-15" width="20" height="30" rx="2" />
        <rect x="-12" y="-20" width="24" height="5" rx="1" />
        <line x1="-10" y1="0" x2="10" y2="0" />
      </g>
    </g>

    <!-- === SCATTERED GLOBULES (Pills) === -->
    <circle cx="200" cy="200" r="4" />
    <circle cx="220" cy="210" r="3" />
    <circle cx="190" cy="225" r="5" />
    
    <circle cx="450" cy="150" r="4" />
    <circle cx="470" cy="130" r="3" />
    <circle cx="480" cy="160" r="4" />

    <circle cx="350" cy="550" r="5" />
    <circle cx="330" cy="530" r="3" />
    <circle cx="370" cy="570" r="4" />

    <circle cx="700" cy="300" r="3" />
    <circle cx="720" cy="280" r="4" />

  </g>
</svg>
