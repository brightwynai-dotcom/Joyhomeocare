<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <g fill="none" stroke="#2D6A4F" stroke-linecap="round" stroke-linejoin="round" opacity="0.08" stroke-width="1.5">
    
    <!-- Top Left: Delicate Leaf Branch -->
    <g transform="translate(150, 150) rotate(-25) scale(1.5)">
      <path d="M0,0 Q20,-30 40,-60" />
      <!-- Leaves -->
      <path d="M10,-15 Q20,-20 15,-30 Q5,-25 10,-15 Z" />
      <path d="M25,-35 Q35,-40 30,-50 Q20,-45 25,-35 Z" />
      <path d="M5,-5 Q-5,-15 -15,-10 Q-10,0 5,-5 Z" />
      <path d="M20,-25 Q10,-35 0,-30 Q5,-20 20,-25 Z" />
    </g>

    <!-- Top Right: Concentric Water Ripples / Drops -->
    <g transform="translate(650, 200)">
      <circle cx="0" cy="0" r="20" stroke-width="1" />
      <circle cx="0" cy="0" r="40" stroke-width="0.8" stroke-dasharray="4 6" />
      <circle cx="0" cy="0" r="60" stroke-width="0.5" stroke-dasharray="2 8" />
      <!-- Drop -->
      <path d="M0,-10 Q10,10 0,20 Q-10,10 0,-10 Z" fill="#2D6A4F" opacity="0.1" />
    </g>

    <!-- Center Left: Minimalist Lotus/Flower -->
    <g transform="translate(200, 450) scale(1.2)">
      <path d="M0,20 Q-20,10 0,-10 Q20,10 0,20 Z" />
      <path d="M0,20 Q-30,5 -15,-5 Q-10,5 0,20 Z" />
      <path d="M0,20 Q30,5 15,-5 Q10,5 0,20 Z" />
      <!-- Base line -->
      <path d="M-25,25 Q0,30 25,25" />
    </g>

    <!-- Center Right: Delicate Cross & Leaves -->
    <g transform="translate(550, 400)">
      <line x1="-15" y1="0" x2="15" y2="0" />
      <line x1="0" y1="-15" x2="0" y2="15" />
      <path d="M15,0 Q25,-10 35,0 Q25,10 15,0 Z" />
      <path d="M-15,0 Q-25,-10 -35,0 Q-25,10 -15,0 Z" />
      <path d="M0,15 Q10,25 0,35 Q-10,25 0,15 Z" />
      <path d="M0,-15 Q10,-25 0,-35 Q-10,-25 0,-15 Z" />
    </g>

    <!-- Bottom Left: Abstract geometric / molecular shapes (Homeopathy potency concept) -->
    <g transform="translate(250, 650)">
      <circle cx="0" cy="0" r="15" />
      <circle cx="-30" cy="-20" r="8" />
      <circle cx="25" cy="-25" r="10" />
      <circle cx="30" cy="15" r="6" />
      <line x1="-10" y1="-10" x2="-22" y2="-15" stroke-dasharray="2 4" />
      <line x1="12" y1="-10" x2="18" y2="-18" stroke-dasharray="2 4" />
      <line x1="14" y1="5" x2="25" y2="12" stroke-dasharray="2 4" />
    </g>

    <!-- Bottom Right: Botanical stem -->
    <g transform="translate(600, 650) rotate(15) scale(1.3)">
      <path d="M0,30 Q-10,0 10,-30" />
      <path d="M0,15 Q15,10 15,0 Q5,5 0,15 Z" />
      <path d="M5,0 Q-10,-5 -15,-15 Q-5,-10 5,0 Z" />
      <path d="M8,-15 Q20,-25 15,-35 Q5,-25 8,-15 Z" />
    </g>

    <!-- Scattered subtle dots for airiness -->
    <circle cx="100" cy="300" r="2" />
    <circle cx="120" cy="320" r="1.5" />
    <circle cx="400" cy="150" r="2" />
    <circle cx="380" cy="180" r="1" />
    <circle cx="700" cy="600" r="2" />
    <circle cx="730" cy="580" r="1.5" />
    <circle cx="350" cy="600" r="2" />
    <circle cx="500" cy="700" r="2" />

  </g>
</svg>
