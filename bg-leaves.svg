<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <g fill="none" stroke="#24543D" stroke-linecap="round" stroke-linejoin="round" opacity="0.10">

    <!-- === TOP-LEFT: Large fern branch === -->
    <g transform="translate(10, 40) rotate(-20)">
      <line x1="0" y1="0" x2="120" y2="0" stroke-width="1.2"/>
      <path d="M20,0 Q10,-16 0,-30" stroke-width="0.8"/>
      <path d="M20,0 Q30,-12 40,-24" stroke-width="0.8"/>
      <path d="M40,0 Q28,-20 16,-38" stroke-width="0.8"/>
      <path d="M40,0 Q52,-15 62,-28" stroke-width="0.8"/>
      <path d="M60,0 Q48,-22 38,-42" stroke-width="0.8"/>
      <path d="M60,0 Q72,-16 82,-30" stroke-width="0.8"/>
      <path d="M80,0 Q68,-20 58,-40" stroke-width="0.8"/>
      <path d="M80,0 Q92,-15 100,-28" stroke-width="0.8"/>
      <path d="M100,0 Q88,-18 80,-34" stroke-width="0.8"/>
      <path d="M100,0 Q110,-12 118,-22" stroke-width="0.8"/>
    </g>

    <!-- === TOP-RIGHT: Mortar and Pestle === -->
    <g transform="translate(620, 30)">
      <!-- Pestle handle -->
      <line x1="60" y1="10" x2="80" y2="60" stroke-width="1.8"/>
      <!-- Pestle head -->
      <ellipse cx="80" cy="63" rx="8" ry="5" stroke-width="1.2"/>
      <!-- Mortar bowl -->
      <path d="M20,70 Q50,110 100,70" stroke-width="1.5"/>
      <path d="M20,70 L15,90 Q50,120 105,90 L100,70" stroke-width="1.2"/>
      <ellipse cx="60" cy="70" rx="40" ry="8" stroke-width="1.2"/>
      <!-- Decorative leaves around it -->
      <path d="M10,65 Q-10,45 -5,20 Q5,42 10,65" stroke-width="0.9"/>
      <path d="M-5,20 Q8,38 10,65" stroke-width="0.5" stroke-dasharray="2,3"/>
      <path d="M110,60 Q130,40 125,15 Q115,38 110,60" stroke-width="0.9"/>
    </g>

    <!-- === CENTER-LEFT: Remedy Bottle === -->
    <g transform="translate(30, 300)">
      <!-- Bottle body -->
      <path d="M10,80 Q5,60 8,40 L8,20 L22,20 L22,40 Q25,60 20,80 Z" stroke-width="1.2"/>
      <!-- Bottle neck -->
      <rect x="10" y="12" width="10" height="10" rx="2" stroke-width="1"/>
      <!-- Cork -->
      <rect x="11" y="8" width="8" height="6" rx="2" stroke-width="1"/>
      <!-- Bottle label lines -->
      <line x1="11" y1="50" x2="19" y2="50" stroke-width="0.7"/>
      <line x1="11" y1="55" x2="19" y2="55" stroke-width="0.7"/>
      <line x1="11" y1="60" x2="19" y2="60" stroke-width="0.7"/>
      <!-- Decorative pills/granules near bottle -->
      <circle cx="35" cy="85" r="3" stroke-width="0.8"/>
      <circle cx="42" cy="79" r="2.5" stroke-width="0.8"/>
      <circle cx="50" cy="86" r="2" stroke-width="0.8"/>
    </g>

    <!-- === CENTER: Large botanical leaf cluster === -->
    <g transform="translate(340, 280)">
      <!-- Center stem -->
      <path d="M0,80 Q10,40 30,0" stroke-width="1.2"/>
      <!-- Left leaves -->
      <path d="M6,70 Q-30,50 -40,20 Q-15,45 6,70" stroke-width="1"/>
      <path d="M6,70 Q-20,55 -40,20" stroke-width="0.5" stroke-dasharray="2,3"/>
      <path d="M12,55 Q-18,35 -25,5 Q-8,30 12,55" stroke-width="1"/>
      <path d="M18,40 Q-5,22 -8,-8 Q5,18 18,40" stroke-width="1"/>
      <!-- Right leaves -->
      <path d="M15,65 Q50,45 58,15 Q38,42 15,65" stroke-width="1"/>
      <path d="M20,50 Q52,30 55,0 Q34,26 20,50" stroke-width="1"/>
      <path d="M25,35 Q48,18 46,-10 Q32,15 25,35" stroke-width="1"/>
    </g>

    <!-- === BOTTOM-LEFT: Floral element (Chamomile-style) === -->
    <g transform="translate(60, 600)">
      <!-- Stem -->
      <line x1="30" y1="140" x2="30" y2="60" stroke-width="1.2"/>
      <!-- Petals -->
      <ellipse cx="30" cy="45" rx="6" ry="16" stroke-width="0.9" transform="rotate(0,30,45)"/>
      <ellipse cx="30" cy="45" rx="6" ry="16" stroke-width="0.9" transform="rotate(45,30,45)"/>
      <ellipse cx="30" cy="45" rx="6" ry="16" stroke-width="0.9" transform="rotate(90,30,45)"/>
      <ellipse cx="30" cy="45" rx="6" ry="16" stroke-width="0.9" transform="rotate(135,30,45)"/>
      <!-- Center disc -->
      <circle cx="30" cy="45" r="9" stroke-width="1"/>
      <!-- Small leaves on stem -->
      <path d="M30,100 Q10,88 8,72 Q22,86 30,100" stroke-width="0.9"/>
      <path d="M30,100 Q50,86 52,72 Q38,84 30,100" stroke-width="0.9"/>
    </g>

    <!-- === BOTTOM-CENTER: Herb sprig === -->
    <g transform="translate(340, 650)">
      <line x1="0" y1="100" x2="0" y2="0" stroke-width="1.2"/>
      <!-- Small oval leaves alternating -->
      <ellipse cx="-12" cy="80" rx="8" ry="12" stroke-width="0.9" transform="rotate(-25,-12,80)"/>
      <ellipse cx="12" cy="65" rx="8" ry="12" stroke-width="0.9" transform="rotate(25,12,65)"/>
      <ellipse cx="-12" cy="50" rx="8" ry="12" stroke-width="0.9" transform="rotate(-25,-12,50)"/>
      <ellipse cx="12" cy="35" rx="8" ry="12" stroke-width="0.9" transform="rotate(25,12,35)"/>
      <ellipse cx="-8" cy="20" rx="7" ry="10" stroke-width="0.9" transform="rotate(-15,-8,20)"/>
      <ellipse cx="8" cy="10" rx="6" ry="9" stroke-width="0.9" transform="rotate(10,8,10)"/>
    </g>

    <!-- === BOTTOM-RIGHT: Tall decorative plant === -->
    <g transform="translate(660, 560)">
      <line x1="0" y1="200" x2="0" y2="10" stroke-width="1.3"/>
      <!-- Large curved leaves drooping down -->
      <path d="M0,60 Q40,55 60,80 Q35,70 0,60" stroke-width="1"/>
      <path d="M0,60 Q38,60 60,80" stroke-width="0.5" stroke-dasharray="2,3"/>
      <path d="M0,100 Q-40,95 -58,120 Q-33,108 0,100" stroke-width="1"/>
      <path d="M0,100 Q-36,98 -58,120" stroke-width="0.5" stroke-dasharray="2,3"/>
      <path d="M0,140 Q42,132 62,158 Q36,148 0,140" stroke-width="1"/>
      <path d="M0,170 Q-38,162 -56,188 Q-30,176 0,170" stroke-width="1"/>
    </g>

    <!-- === RIGHT MID: Small scattered remedy pills === -->
    <g transform="translate(680, 340)">
      <circle cx="0" cy="0" r="5" stroke-width="0.9"/>
      <circle cx="15" cy="10" r="4" stroke-width="0.9"/>
      <circle cx="5" cy="22" r="5" stroke-width="0.9"/>
      <circle cx="-12" cy="14" r="3.5" stroke-width="0.9"/>
      <circle cx="22" cy="-5" r="3" stroke-width="0.9"/>
      <circle cx="-8" cy="-10" r="4" stroke-width="0.9"/>
    </g>

    <!-- === TOP-CENTER: Second bottle (taller) === -->
    <g transform="translate(360, 10)">
      <path d="M0,100 Q-4,78 -2,55 L-2,30 L12,30 L12,55 Q14,78 10,100 Z" stroke-width="1.1"/>
      <rect x="-1" y="22" width="12" height="10" rx="2" stroke-width="0.9"/>
      <rect x="1" y="16" width="8" height="8" rx="2" stroke-width="1"/>
      <line x1="0" y1="65" x2="9" y2="65" stroke-width="0.7"/>
      <line x1="0" y1="71" x2="9" y2="71" stroke-width="0.7"/>
      <line x1="0" y1="77" x2="9" y2="77" stroke-width="0.7"/>
    </g>

    <!-- === LEFT MID: Another decorative botanical sprig === -->
    <g transform="translate(20, 500) rotate(15)">
      <line x1="0" y1="0" x2="80" y2="0" stroke-width="1.1"/>
      <path d="M15,0 Q8,-14 0,-25" stroke-width="0.8"/>
      <path d="M15,0 Q22,-11 30,-20" stroke-width="0.8"/>
      <path d="M35,0 Q26,-16 18,-30" stroke-width="0.8"/>
      <path d="M35,0 Q44,-13 52,-24" stroke-width="0.8"/>
      <path d="M55,0 Q46,-14 40,-26" stroke-width="0.8"/>
      <path d="M55,0 Q64,-11 70,-20" stroke-width="0.8"/>
    </g>

  </g>
</svg>
